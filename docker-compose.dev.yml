version: '3.8'

services:
  app:
    build: .
    container_name: riddlezinho_dev
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://riddlezinho:password@db:5432/riddlezinho
      JWT_SECRET: dev-secret-not-for-production
    volumes:
      - ./src:/app/src:ro
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - riddlezinho_network

  db:
    image: postgres:16-alpine
    container_name: riddlezinho_db_dev
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: riddlezinho
      POSTGRES_PASSWORD: password
      POSTGRES_DB: riddlezinho
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - riddlezinho_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U riddlezinho"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_dev_data:
    driver: local

networks:
  riddlezinho_network:
    driver: bridge
